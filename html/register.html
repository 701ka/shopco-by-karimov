<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <link rel="stylesheet" href="../css/main.css" />
    <link
      href="
        https://cdn.jsdelivr.net/npm/izitoast@1.4.0/dist/css/iziToast.min.css
        "
      rel="stylesheet"
    />
  </head>
  <!-- From Uiverse.io by andrew-manzyk -->

  <body class="register__body">
    <div class="loader__wrapper">
      <div class="loader">
        <div class="text"><span>Loading</span></div>
        <div class="text"><span>Loading</span></div>
        <div class="text"><span>Loading</span></div>
        <div class="text"><span>Loading</span></div>
        <div class="text"><span>Loading</span></div>
        <div class="text"><span>Loading</span></div>
        <div class="text"><span>Loading</span></div>
        <div class="text"><span>Loading</span></div>
        <div class="text"><span>Loading</span></div>
        <div class="line"></div>
      </div>
    </div>
    <section class="register">
      <div class="container">
        <h1 class="register__title">REGISTER</h1>
        <form action="" class="register__form">
          <input
            value="Ali"
            type="text"
            name=""
            id=""
            class="firstname__inp register__inp"
            placeholder="firstname"
          />

          <input
            value="aliyev"
            type="text"
            name=""
            id=""
            class="lastname__inp register__inp"
            placeholder="lastname"
          /><input
            type="text"
            name=""
            id=""
            class="email__inp register__inp"
            placeholder="email"
          /><input
            value="12345678"
            type="text"
            name=""
            id=""
            class="password__inp register__inp"
            placeholder="password"
          />
          <input
            type="text"
            value="user"
            name=""
            id=""
            class="role__inp register__inp"
            placeholder="role"
          />
          <button class="form__btn">Sign up</button>
        </form>
        <p class="register__text">
          Have an account?
          <a href="./log-in.html" class="register__link">Log in</a>
        </p>
      </div>
    </section>

    <script src="
https://cdn.jsdelivr.net/npm/izitoast@1.4.0/dist/js/iziToast.min.js
"></script>
    <script src="../js/register.js"></script>
  </body>
</html>
